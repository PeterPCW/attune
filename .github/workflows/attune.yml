name: Attune Code Quality

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  attune:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Attune
        run: npm install -g attune

      - name: Run Attune Lite
        id: attune
        run: |
          attune analyze . --json --output attune-results.json || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attune-results
          path: attune-results.json
          retention-days: 30

      - name: Parse and post results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Check if results file exists
            const resultsPath = path.join(process.cwd(), 'attune-results.json');
            if (!fs.existsSync(resultsPath)) {
              console.log('No Attune results found');
              return;
            }

            const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
            const findings = results.findings || [];

            // Create comment body
            let commentBody = '## Attune Code Quality Scan\n\n';

            if (findings.length === 0) {
              commentBody += '✅ **No issues found!** Your code is ready to ship.\n';
            } else {
              const critical = findings.filter(f => f.severity === 'critical').length;
              const high = findings.filter(f => f.severity === 'high').length;
              const medium = findings.filter(f => f.severity === 'medium').length;
              const low = findings.filter(f => f.severity === 'low').length;

              commentBody += `**Summary:** ${critical} critical, ${high} high, ${medium} medium, ${low} low issues found\n\n`;

              if (critical > 0 || high > 0) {
                commentBody += '### Top Issues\n\n';
                findings
                  .filter(f => f.severity === 'critical' || f.severity === 'high')
                  .slice(0, 5)
                  .forEach(f => {
                    commentBody += `- **[${f.severity.toUpperCase()}]** ${f.ruleId}: ${f.message}\n`;
                    commentBody += `  - \`${f.file}\`\n`;
                  });
              }

              commentBody += '\n<details><summary>View All Results</summary>\n\n';
              commentBody += '```json\n';
              commentBody += JSON.stringify(findings.slice(0, 20), null, 2);
              commentBody += '\n```\n';
              commentBody += '</details>\n';
            }

            commentBody += '\n---\n*Powered by [Attune](https://github.com/marketplace/attune)*';

            // Post or update comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const attuneComment = comments.find(c => c.body.includes('## Attune Code Quality Scan'));

            if (attuneComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: attuneComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }
